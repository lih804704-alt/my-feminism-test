<!DOCTYPE html>

        :root {

            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 进度条 */
        .progress-container {
            margin-bottom: 40px;
        }
        .progress-text {
            font-size: 0.9rem;
            color: var(--gray-text);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .progress-bar {
            height: 2px;
            background: var(--border-color);
            width: 100%;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        /* 题目样式 */
        .question-section h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 40px;
            min-height: 4em;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background: none;
            border: 1px solid var(--border-color);
            padding: 20px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            border-radius: 4px;
        }

        .option-btn:hover {
            background-color: #f9f9f9;
            border-color: var(--accent-color);
        }

        .option-school {
            display: block;
            font-size: 0.75rem;
            color: var(--gray-text);
            margin-top: 8px;
        }

        /* 导航按钮 */
        .nav-controls {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
        }

        button.secondary {
            background: none;
            border: none;
            color: var(--gray-text);
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
        }

        /* 结果页面 */
        .result-section { display: none; }
        .chart-container {
            margin: 30px 0;
            aspect-ratio: 1;
        }

        .result-card {
            border: 1px solid var(--text-color);
            padding: 30px;
            margin-top: 30px;
        }

        .card-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 5px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .school-name { font-size: 1.8rem; margin: 10px 0; }
        .mentor-box, .book-box { margin-top: 20px; }
        .label-small { font-weight: bold; font-size: 0.9rem; display: block; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

/** 3. 逻辑控制 **/
let currentIdx = 0;
let userAnswers = []; // 存储每题选中的流派

function initQuiz() {
    renderQuestion();
}

function renderQuestion() {
    const q = questions[currentIdx];
    document.getElementById('progress-text').innerText = `QUESTION ${String(currentIdx + 1).padStart(2, '0')}/20`;
    document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / 20) * 100}%`;
    document.getElementById('question-text').innerText = q.text;
    
    const optionsHtml = q.options.map(opt => `
        <button class="option-btn" onclick="handleSelect('${opt.school}')">
            ${opt.text}
            <span class="option-school">${opt.school}</span>
        </button>
    `).join('');
    
    document.getElementById('options-list').innerHTML = optionsHtml;
    document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
}

function handleSelect(school) {
    userAnswers[currentIdx] = school;
    if (currentIdx < questions.length - 1) {
        currentIdx++;
        renderQuestion();
    } else {
        showResult();
    }
}

function prevQuestion() {
    if (currentIdx > 0) {
        currentIdx--;
        renderQuestion();
    }
}

function restart() {
    currentIdx = 0;
    userAnswers = [];
    document.getElementById('quiz-container').style.display = 'block';
    document.getElementById('result-container').style.display = 'none';
    initQuiz();
}

function showResult() {
    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('result-container').style.display = 'block';

    // 计算得分
    const scores = { "自由主义": 0, "激进主义": 0, "社会主义": 0, "后现代主义": 0, "生态女性主义": 0, "精神分析女性主义": 0, "存在主义女性主义": 0 };
    userAnswers.forEach(s => scores[s]++);

    // 转换为百分比
    const labels = Object.keys(scores);
    const dataValues = labels.map(l => (scores[l] / userAnswers.length) * 100);

    // 绘制雷达图
    const ctx = document.getElementById('scoreChart').getContext('2d');
    if(window.myRadar) window.myRadar.destroy();
    window.myRadar = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [{
                label: '思想倾向倾向 (%)',
                data: dataValues,
                backgroundColor: 'rgba(0, 0, 0, 0.05)',
                borderColor: '#1a1a1a',
                borderWidth: 1,
                pointBackgroundColor: '#1a1a1a'
            }]
        },
        options: {
            scales: {
                r: { beginAtZero: true, max: 50, ticks: { display: false } }
            },
            plugins: { legend: { display: false } }
        }
    });

    // 寻找主导流派
    const maxScore = Math.max(...Object.values(scores));
    const dominantSchools = labels.filter(l => scores[l] === maxScore);

    // 渲染结果卡片
    const resultHtml = dominantSchools.map(name => {
        const info = schoolsInfo[name];
        return `
            <div class="result-card">
                <span class="card-label">主导倾向 / Dominant Perspective</span>
                <h2 class="school-name">${name}</h2>
                <p>${info.desc}</p>
                <div class="mentor-box">
                    <span class="label-small">精神导师</span>
                    <p style="margin:5px 0">${info.mentors}</p>
                </div>
                <div class="book-box">
                    <span class="label-small">深度阅读</span>
                    <p style="margin:5px 0; font-style: italic;">${info.books}</p>
                </div>
            </div>
        `;
    }).join('');

    document.getElementById('primary-results').innerHTML = resultHtml;
    window.scrollTo(0,0);
}

// 启动
initQuiz();
</script>

</body>
</html>
